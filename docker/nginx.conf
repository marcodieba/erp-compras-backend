upstream erp_web {
    server web:8000;
}

server {
    listen 80;
    server_name localhost;

    # Encaminhamento de API e Painel Admin
    location / {
        proxy_pass http://erp_web;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Encaminhamento de WebSockets (Django Channels)
    location /ws/ {
        proxy_pass http://erp_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Ficheiros Estáticos
    location /static/ {
        alias /app/static/;
    }
    
    # Uploads (PDFs, Imagens)
    location /media/ {
        alias /app/media/;
    }
}